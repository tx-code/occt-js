<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>occt-js Demo</title>
<script src="https://cdn.babylonjs.com/babylon.js"></script>
<script src="picking.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #1a1a2e; color: #eee; overflow: hidden; height: 100vh; }
#renderCanvas { width: 100%; height: 100%; display: block; outline: none; }

/* Drop overlay */
#dropZone {
  position: absolute; inset: 0; z-index: 100;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: rgba(26, 26, 46, 0.95);
  transition: opacity 0.3s;
}
#dropZone.hidden { opacity: 0; pointer-events: none; }
#dropZone.drag-over { background: rgba(26, 26, 46, 0.98); }
#dropZone.drag-over .drop-border { border-color: #4cc9f0; }
.drop-border {
  border: 2px dashed #555; border-radius: 16px; padding: 48px 64px;
  text-align: center; transition: border-color 0.2s;
}
.drop-border h2 { font-size: 20px; font-weight: 500; margin-bottom: 12px; }
.drop-border p { color: #888; font-size: 14px; margin-bottom: 20px; }
#fileInput { display: none; }
.btn {
  background: #4cc9f0; color: #1a1a2e; border: none; padding: 10px 24px;
  border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600;
}
.btn:hover { background: #7dd3fc; }

/* Top bar */
#topBar {
  position: absolute; top: 0; left: 0; right: 0; z-index: 10;
  display: flex; align-items: center; gap: 12px;
  padding: 10px 16px; background: rgba(26, 26, 46, 0.85);
  backdrop-filter: blur(8px); border-bottom: 1px solid #333;
}
#topBar .title { font-size: 15px; font-weight: 600; color: #4cc9f0; }
#topBar .sep { width: 1px; height: 20px; background: #444; }
#topBar .fileName { font-size: 13px; color: #aaa; }
#topBar .btn-sm {
  background: #333; color: #ccc; border: none; padding: 6px 14px;
  border-radius: 6px; cursor: pointer; font-size: 12px;
}
#topBar .btn-sm:hover { background: #444; }

/* Stats panel */
#statsPanel {
  position: absolute; bottom: 16px; left: 16px; z-index: 10;
  background: rgba(26, 26, 46, 0.9); border: 1px solid #333;
  border-radius: 10px; padding: 14px 18px; font-size: 12px;
  backdrop-filter: blur(8px); min-width: 180px;
}
#statsPanel h3 { font-size: 13px; color: #4cc9f0; margin-bottom: 8px; }
#statsPanel .row { display: flex; justify-content: space-between; padding: 2px 0; }
#statsPanel .label { color: #888; }
#statsPanel .value { color: #ddd; font-variant-numeric: tabular-nums; }

/* Toggle buttons */
#viewControls {
  position: absolute; bottom: 16px; right: 16px; z-index: 10;
  display: flex; gap: 6px;
}
.toggle {
  background: rgba(26, 26, 46, 0.9); border: 1px solid #444; color: #ccc;
  padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px;
}
.toggle.active { border-color: #4cc9f0; color: #4cc9f0; }

#selectMode {
  position: absolute; bottom: 16px; right: 200px; z-index: 10;
  display: flex; align-items: center; gap: 6px;
}
#selectMode .mode-label { color: #888; font-size: 12px; margin-right: 2px; }

/* Selection info panel */
#selectionPanel {
  position: absolute; top: 56px; right: 16px; z-index: 10;
  background: rgba(26, 26, 46, 0.9); border: 1px solid #4cc9f0;
  border-radius: 10px; padding: 14px 18px; font-size: 12px;
  backdrop-filter: blur(8px); min-width: 180px;
}
#selectionPanel h3 { font-size: 13px; color: #4cc9f0; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
#selectionPanel h3 .close { cursor: pointer; color: #888; font-size: 16px; line-height: 1; }
#selectionPanel h3 .close:hover { color: #fff; }
#selectionPanel .row { display: flex; justify-content: space-between; padding: 2px 0; }
#selectionPanel .label { color: #888; }
#selectionPanel .value { color: #ddd; font-variant-numeric: tabular-nums; }

/* Loading */
#loading {
  position: absolute; inset: 0; z-index: 200;
  display: none; align-items: center; justify-content: center;
  background: rgba(26, 26, 46, 0.9);
}
#loading.show { display: flex; }
.spinner { width: 32px; height: 32px; border: 3px solid #333; border-top-color: #4cc9f0; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
#loading span { margin-left: 12px; font-size: 14px; }
</style>
</head>
<body>

<canvas id="renderCanvas"></canvas>

<div id="dropZone">
  <div class="drop-border">
    <h2>occt-js Viewer</h2>
    <p>Drop a STEP, IGES, or BREP file here</p>
    <button class="btn" onclick="document.getElementById('fileInput').click()">Browse Files</button>
    <input type="file" id="fileInput" accept=".step,.stp,.iges,.igs,.brep,.brp">
    <p style="margin-top:16px;font-size:12px;color:#666">Or try with a <a href="#" id="loadSample" style="color:#4cc9f0">sample file</a></p>
  </div>
</div>

<div id="topBar" style="display:none">
  <span class="title">occt-js</span>
  <span class="sep"></span>
  <span class="fileName" id="fileNameDisplay"></span>
  <span style="flex:1"></span>
  <button class="btn-sm" onclick="document.getElementById('fileInput2').click()">Open File</button>
  <input type="file" id="fileInput2" accept=".step,.stp,.iges,.igs,.brep,.brp" style="display:none">
  <button class="btn-sm" id="resetBtn">Reset View</button>
</div>

<div id="statsPanel" style="display:none">
  <h3>Model Info</h3>
  <div id="statsContent"></div>
</div>

<div id="viewControls" style="display:none">
  <button class="toggle active" id="toggleFaces">Faces</button>
  <button class="toggle active" id="toggleEdges">Edges</button>
</div>

<div id="selectMode" style="display:none">
  <span class="mode-label">Select:</span>
  <button class="toggle active" id="modeFace" data-mode="face">Face</button>
  <button class="toggle" id="modeEdge" data-mode="edge">Edge</button>
  <button class="toggle" id="modeVertex" data-mode="vertex">Vertex</button>
</div>

<div id="selectionPanel" style="display:none">
  <h3><span id="selectionTitle">Selected Face</span> <span class="close" id="clearSelection">&times;</span></h3>
  <div id="selectionContent"></div>
</div>

<div id="loading"><div class="spinner"></div><span>Loading model...</span></div>

<script>
// --- Globals ---
let engine, scene, camera, occtModule;
let currentMeshes = [], currentEdgeLines = [], currentTransformNodes = [];
let facesVisible = true, edgesVisible = true;

// Picking state
let meshGeoMap = new Map(); // Babylon mesh → raw geometry data

// --- Babylon Setup ---
function initBabylon() {
  const canvas = document.getElementById("renderCanvas");
  engine = new BABYLON.Engine(canvas, true, { preserveDrawingBuffer: true, stencil: true });
  scene = new BABYLON.Scene(engine);
  scene.clearColor = new BABYLON.Color4(0.1, 0.1, 0.12, 1);

  camera = new BABYLON.ArcRotateCamera("cam", Math.PI / 4, Math.PI / 3, 100, BABYLON.Vector3.Zero(), scene);
  camera.attachControl(canvas, true);
  camera.wheelPrecision = 5;       // lower = faster zoom (default 3, was 20)
  camera.wheelDeltaPercentage = 0.05; // smooth percentage-based zoom
  camera.minZ = 0.1;
  camera.panningSensibility = 30;  // lower = faster pan

  const light = new BABYLON.HemisphericLight("hemi", new BABYLON.Vector3(0, 1, 0), scene);
  light.intensity = 0.9;
  light.groundColor = new BABYLON.Color3(0.2, 0.2, 0.25);

  const dir = new BABYLON.DirectionalLight("dir", new BABYLON.Vector3(-1, -2, 1), scene);
  dir.intensity = 0.5;

  engine.runRenderLoop(() => scene.render());
  window.addEventListener("resize", () => engine.resize());
}

// --- OCCT Module ---
async function initOcct() {
  const script = document.createElement("script");
  const CDN = "https://unpkg.com/@tx-code/occt-js@0.1.1/dist/";
  script.src = CDN + "occt-js.js";
  document.head.appendChild(script);
  await new Promise((resolve, reject) => { script.onload = resolve; script.onerror = reject; });
  occtModule = await OcctJS({ locateFile: (f) => CDN + f });
}

// --- Format Detection ---
function detectFormat(fileName) {
  const ext = fileName.toLowerCase().split(".").pop();
  const map = { step: "step", stp: "step", iges: "iges", igs: "iges", brep: "brep", brp: "brep" };
  return map[ext] || null;
}

// --- Import Model ---
function importModel(bytes, format) {
  const methods = { step: "ReadStepFile", iges: "ReadIgesFile", brep: "ReadBrepFile" };
  const method = methods[format];
  if (!method || !occtModule[method]) {
    return occtModule.ReadFile(format, bytes, {});
  }
  return occtModule[method](bytes, {});
}

// --- Build Scene ---
function buildScene(result) {
  clearScene();

  const defaultColor = new BABYLON.Color3(0.7, 0.7, 0.7);
  const edgeColor = new BABYLON.Color3(0.15, 0.15, 0.18);

  // Material cache
  const materialCache = new Map();
  function getMaterial(color) {
    if (!color) return getDefaultMaterial();
    const key = `${(color.r * 255) | 0},${(color.g * 255) | 0},${(color.b * 255) | 0}`;
    if (materialCache.has(key)) return materialCache.get(key);
    const mat = new BABYLON.StandardMaterial("mat_" + key, scene);
    mat.diffuseColor = new BABYLON.Color3(color.r, color.g, color.b);
    mat.backFaceCulling = false;
    mat.twoSidedLighting = true;
    materialCache.set(key, mat);
    return mat;
  }
  function getDefaultMaterial() {
    if (!materialCache.has("default")) {
      const mat = new BABYLON.StandardMaterial("mat_default", scene);
      mat.diffuseColor = defaultColor;
      mat.backFaceCulling = false;
      mat.twoSidedLighting = true;
      materialCache.set("default", mat);
    }
    return materialCache.get("default");
  }

  // Geometry cache for instancing
  const geoCache = new Map();

  function applyTransform(node, transform) {
    if (!transform || transform.length !== 16) return;
    const m = BABYLON.Matrix.FromArray(transform);
    const s = new BABYLON.Vector3();
    const r = BABYLON.Quaternion.Identity();
    const p = new BABYLON.Vector3();
    m.decompose(s, r, p);
    node.position.copyFrom(p);
    node.scaling.copyFrom(s);
    node.rotationQuaternion = r;
  }

  function buildEdgeLines(geo, parent) {
    if (!geo.edges || geo.edges.length === 0) return;
    const lines = [];
    for (const edge of geo.edges) {
      const pts = edge.points;
      if (!pts || pts.length < 6) continue;
      const line = [];
      for (let i = 0; i < pts.length; i += 3) {
        line.push(new BABYLON.Vector3(pts[i], pts[i + 1], pts[i + 2]));
      }
      lines.push(line);
    }
    if (lines.length === 0) return;
    const lineSystem = BABYLON.MeshBuilder.CreateLineSystem("edges", { lines }, scene);
    lineSystem.color = edgeColor;
    lineSystem.parent = parent;
    lineSystem.isPickable = false;
    currentEdgeLines.push(lineSystem);
  }

  function buildPart(nodeData, parent) {
    const meshIndices = nodeData.meshes || [];
    if (meshIndices.length === 0) return;

    for (let mi = 0; mi < meshIndices.length; mi++) {
      const geoIdx = meshIndices[mi];
      const geo = result.geometries[geoIdx];
      if (!geo || !geo.positions || geo.positions.length === 0) continue;

      // Check if this geometry has multiple face colors
      const hasPerFaceColors = geo.faces && geo.faces.some(f => f.color) &&
        new Set(geo.faces.filter(f => f.color).map(f => `${(f.color.r*255)|0},${(f.color.g*255)|0},${(f.color.b*255)|0}`)).size > 1;

      const cacheKey = `${geoIdx}`;
      if (geoCache.has(cacheKey)) {
        const source = geoCache.get(cacheKey);
        const inst = source.createInstance(nodeData.name || "part_inst");
        inst.parent = parent;
        applyTransform(inst, nodeData.transform);
        currentMeshes.push(inst);
        return;
      }

      const meshName = nodeData.name || `part_${nodeData.id || mi}`;
      const mesh = new BABYLON.Mesh(meshName, scene);
      mesh.parent = parent;
      applyTransform(mesh, nodeData.transform);

      const positions = new Float32Array(geo.positions);
      const indices = new Uint32Array(geo.indices);
      const vertexData = new BABYLON.VertexData();
      vertexData.positions = positions;
      vertexData.indices = indices;
      if (geo.normals && geo.normals.length > 0) {
        vertexData.normals = new Float32Array(geo.normals);
      }

      // Per-face vertex coloring: assign RGBA color per vertex based on face ownership
      if (hasPerFaceColors && geo.faces) {
        const vertexCount = positions.length / 3;
        const colors = new Float32Array(vertexCount * 4);
        // Default color for vertices not covered by any face
        for (let v = 0; v < vertexCount; v++) {
          colors[v * 4] = 0.7; colors[v * 4 + 1] = 0.7; colors[v * 4 + 2] = 0.7; colors[v * 4 + 3] = 1;
        }
        for (const face of geo.faces) {
          const c = face.color || (geo.color ? geo.color : null);
          const r = c ? c.r : 0.7, g = c ? c.g : 0.7, b = c ? c.b : 0.7;
          for (let i = face.firstIndex; i < face.firstIndex + face.indexCount; i++) {
            const vi = indices[i];
            colors[vi * 4] = r;
            colors[vi * 4 + 1] = g;
            colors[vi * 4 + 2] = b;
            colors[vi * 4 + 3] = 1;
          }
        }
        vertexData.colors = colors;
      }

      vertexData.applyToMesh(mesh);

      // Material: white diffuse for vertex-colored meshes, face color for single-color
      if (hasPerFaceColors) {
        const mat = new BABYLON.StandardMaterial("mat_vcolor_" + geoIdx, scene);
        mat.diffuseColor = new BABYLON.Color3(1, 1, 1);
        mat.backFaceCulling = false;
        mat.twoSidedLighting = true;
        mesh.material = mat;
      } else {
        let meshColor = geo.color;
        if (geo.faces) {
          for (const face of geo.faces) {
            if (face.color) { meshColor = face.color; break; }
          }
        }
        mesh.material = getMaterial(meshColor);
      }

      // Store raw geometry for picking
      meshGeoMap.set(mesh, geo);

      geoCache.set(cacheKey, mesh);
      currentMeshes.push(mesh);

      // Edge lines in geometry local space
      buildEdgeLines(geo, mesh);
    }
  }

  function buildNode(nodeData, parent) {
    if (nodeData.isAssembly || (nodeData.children && nodeData.children.length > 0)) {
      const tn = new BABYLON.TransformNode(nodeData.name || "assembly", scene);
      tn.parent = parent;
      applyTransform(tn, nodeData.transform);
      currentTransformNodes.push(tn);
      if (nodeData.children) {
        for (const child of nodeData.children) buildNode(child, tn);
      }
      // Assembly may also have direct meshes
      if (nodeData.meshes && nodeData.meshes.length > 0) {
        buildPart(nodeData, tn);
      }
    } else {
      buildPart(nodeData, parent);
    }
  }

  const root = new BABYLON.TransformNode("__root__", scene);
  currentTransformNodes.push(root);
  for (const rn of (result.rootNodes || [])) {
    buildNode(rn, root);
  }

  // Frame camera with proper zoom limits and clipping
  const bounds = root.getHierarchyBoundingVectors(true);
  const center = bounds.min.add(bounds.max).scale(0.5);
  const extent = bounds.max.subtract(bounds.min);
  const modelSize = extent.length();
  const radius = modelSize * 0.8;

  camera.target = center;
  camera.radius = Math.max(radius, 1);
  camera.alpha = Math.PI / 4;
  camera.beta = Math.PI / 3;

  // Zoom limits based on model size
  camera.lowerRadiusLimit = modelSize * 0.01;   // can't zoom closer than 1% of model size
  camera.upperRadiusLimit = modelSize * 10;      // can't zoom further than 10x model size

  // Dynamic near/far clipping based on model size
  camera.minZ = modelSize * 0.001;
  camera.maxZ = modelSize * 100;
}

function clearScene() {
  clearSelection();
  for (const m of currentMeshes) m.dispose();
  for (const l of currentEdgeLines) l.dispose();
  for (const t of currentTransformNodes) t.dispose();
  currentMeshes = []; currentEdgeLines = []; currentTransformNodes = [];
  meshGeoMap.clear();
  // Dispose materials
  scene.materials.slice().forEach(m => { if (m.name.startsWith("mat_")) m.dispose(); });
}

// --- Picking / Selection ---
function clearSelection() {
  clearAllSelections();
}

function setupPicking() {
  // Track drag to distinguish click vs drag
  let ptrDownX = 0, ptrDownY = 0;
  const DRAG_SQ = 25; // 5px squared

  scene.onPointerObservable.add((pointerInfo) => {
    // Record pointer down position
    if (pointerInfo.type === BABYLON.PointerEventTypes.POINTERDOWN) {
      const e = pointerInfo.event;
      if (e.button === 0) { ptrDownX = e.clientX; ptrDownY = e.clientY; }
      return;
    }

    // Handle both POINTERTAP (hit mesh) and POINTERUP (may miss mesh / empty)
    if (pointerInfo.type !== BABYLON.PointerEventTypes.POINTERTAP &&
        pointerInfo.type !== BABYLON.PointerEventTypes.POINTERUP) return;

    const evt = pointerInfo.event;
    if (evt.button !== 0) return;

    // Check drag distance
    const ddx = evt.clientX - ptrDownX, ddy = evt.clientY - ptrDownY;
    if (ddx * ddx + ddy * ddy > DRAG_SQ) return; // drag — skip

    // POINTERUP on empty space: short click = clear, drag already filtered above
    if (pointerInfo.type === BABYLON.PointerEventTypes.POINTERUP) {
      const pr = scene.pick(scene.pointerX, scene.pointerY);
      if (!pr.hit || !pr.pickedMesh) {
        const isCtrl = evt.ctrlKey || evt.metaKey;
        if (!isCtrl) clearAllSelections();
      }
      return; // either cleared or hit mesh (let POINTERTAP handle mesh hits)
    }

    // POINTERTAP — mesh was hit
    clearHover();

    const pickResult = pointerInfo.pickInfo;
    const isCtrl = evt.ctrlKey || evt.metaKey;

    if (!pickResult.hit || !pickResult.pickedMesh) {
      if (!isCtrl) clearAllSelections();
      return;
    }

    const pickedMesh = pickResult.pickedMesh;
    const sourceMesh = pickedMesh.sourceMesh || pickedMesh;
    const geo = meshGeoMap.get(sourceMesh);
    if (!geo) return; // no geometry data — keep selection

    // Get world matrix of the PICKED mesh (instance or source) for correct positioning
    const worldMatrix = pickedMesh.getWorldMatrix();

    let mode = null, elementId = null, createFn = null;

    if (pickMode === "face" && geo.triangleToFaceMap) {
      const triIndex = pickResult.faceId;
      if (triIndex >= 0 && triIndex < geo.triangleToFaceMap.length) {
        const faceId = geo.triangleToFaceMap[triIndex];
        if (faceId >= 1) {
          const face = geo.faces && geo.faces.find(f => f.id === faceId);
          if (face) {
            mode = "face"; elementId = faceId;
            createFn = () => createFaceSelectDisposables(worldMatrix, face, geo);
          }
        }
      }
    } else if (pickMode === "edge") {
      const worldPt = pickResult.pickedPoint;
      if (worldPt) {
        const localPt = worldToLocal(worldPt, pickedMesh);
        const edgeId = findClosestEdge(localPt, geo, getPickThreshold());
        if (edgeId) {
          const edge = geo.edges && geo.edges.find(e => e.id === edgeId);
          if (edge) {
            mode = "edge"; elementId = edgeId;
            createFn = () => createEdgeSelectDisposables(worldMatrix, edge);
          }
        }
      }
    } else if (pickMode === "vertex") {
      const worldPt = pickResult.pickedPoint;
      if (worldPt) {
        const localPt = worldToLocal(worldPt, pickedMesh);
        const vertexId = findClosestVertex(localPt, geo, getPickThreshold());
        if (vertexId) {
          const vertex = geo.vertices && geo.vertices.find(v => v.id === vertexId);
          if (vertex) {
            mode = "vertex"; elementId = vertexId;
            createFn = () => createVertexSelectDisposables(worldMatrix, vertex);
          }
        }
      }
    }

    if (!elementId) return; // no element found — keep selection

    if (isCtrl) {
      const key = selectionKey(mode, sourceMesh.uniqueId, elementId);
      if (selectionSet.has(key)) {
        removeSelection(key);
      } else {
        addSelection(mode, sourceMesh, elementId, createFn());
      }
      updateSelectionPanel();
    } else {
      clearAllSelections();
      addSelection(mode, sourceMesh, elementId, createFn());
      updateSelectionPanel();
    }
  });

  // Hover
  const canvas = document.getElementById("renderCanvas");
  canvas.addEventListener("pointermove", () => { hoverDirty = true; });
  canvas.addEventListener("pointerleave", () => { clearHover(); hoverDirty = false; });
  scene.onBeforeRenderObservable.add(processHover);
}

// --- Stats ---
function showStats(result, fileName, elapsed) {
  const s = result.stats || {};
  const geos = result.geometries || [];
  let totalFaces = 0, totalEdges = 0, totalVerts = 0;
  for (const g of geos) {
    totalFaces += (g.faces || []).length;
    totalEdges += (g.edges || []).length;
    totalVerts += (g.vertices || []).length;
  }

  const rows = [
    ["Format", result.sourceFormat?.toUpperCase() || "—"],
    ["Nodes", s.nodeCount || 0],
    ["Parts", s.partCount || 0],
    ["Geometries", s.geometryCount || 0],
    ["Triangles", (s.triangleCount || 0).toLocaleString()],
    ["Topo Faces", totalFaces],
    ["Topo Edges", totalEdges],
    ["Topo Vertices", totalVerts],
    ["Reused", s.reusedInstanceCount || 0],
    ["Time", elapsed + " ms"],
  ];

  document.getElementById("statsContent").innerHTML = rows
    .map(([l, v]) => `<div class="row"><span class="label">${l}</span><span class="value">${v}</span></div>`)
    .join("");
  document.getElementById("statsPanel").style.display = "";
  document.getElementById("fileNameDisplay").textContent = fileName;
}

// --- Load File ---
async function loadFile(file) {
  const format = detectFormat(file.name);
  if (!format) { alert("Unsupported format: " + file.name); return; }

  document.getElementById("loading").classList.add("show");

  try {
    if (!occtModule) await initOcct();

    const buffer = await file.arrayBuffer();
    const bytes = new Uint8Array(buffer);

    const t0 = performance.now();
    const result = importModel(bytes, format);
    const elapsed = Math.round(performance.now() - t0);

    if (!result.success) {
      alert("Import failed: " + (result.error || "unknown error"));
      return;
    }

    buildScene(result);
    showStats(result, file.name, elapsed);

    // Switch UI
    document.getElementById("dropZone").classList.add("hidden");
    document.getElementById("topBar").style.display = "";
    document.getElementById("viewControls").style.display = "";
    document.getElementById("selectMode").style.display = "";
  } catch (err) {
    alert("Error: " + err.message);
    console.error(err);
  } finally {
    document.getElementById("loading").classList.remove("show");
  }
}

// --- Load sample ---
async function loadSampleFile() {
  document.getElementById("loading").classList.add("show");
  try {
    if (!occtModule) await initOcct();
    const resp = await fetch("../test/simple_part.step");
    const buffer = await resp.arrayBuffer();
    const bytes = new Uint8Array(buffer);

    const t0 = performance.now();
    const result = importModel(bytes, "step");
    const elapsed = Math.round(performance.now() - t0);

    if (!result.success) { alert("Sample import failed"); return; }

    buildScene(result);
    showStats(result, "simple_part.step", elapsed);

    document.getElementById("dropZone").classList.add("hidden");
    document.getElementById("topBar").style.display = "";
    document.getElementById("viewControls").style.display = "";
    document.getElementById("selectMode").style.display = "";
  } catch (err) {
    alert("Error loading sample: " + err.message);
    console.error(err);
  } finally {
    document.getElementById("loading").classList.remove("show");
  }
}

// --- Event Wiring ---
function init() {
  initBabylon();

  // File inputs
  document.getElementById("fileInput").addEventListener("change", (e) => {
    if (e.target.files[0]) loadFile(e.target.files[0]);
    e.target.value = "";
  });
  document.getElementById("fileInput2").addEventListener("change", (e) => {
    if (e.target.files[0]) loadFile(e.target.files[0]);
    e.target.value = "";
  });

  // Drag & drop
  const dropZone = document.getElementById("dropZone");
  const body = document.body;

  body.addEventListener("dragover", (e) => { e.preventDefault(); dropZone.classList.add("drag-over"); dropZone.classList.remove("hidden"); });
  body.addEventListener("dragleave", (e) => {
    if (!e.relatedTarget || e.relatedTarget === document.documentElement) dropZone.classList.remove("drag-over");
  });
  body.addEventListener("drop", (e) => {
    e.preventDefault();
    dropZone.classList.remove("drag-over");
    if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
  });

  // Sample link
  document.getElementById("loadSample").addEventListener("click", (e) => { e.preventDefault(); loadSampleFile(); });

  // Reset view
  document.getElementById("resetBtn").addEventListener("click", () => {
    const root = currentTransformNodes[0];
    if (!root) return;
    const bounds = root.getHierarchyBoundingVectors(true);
    const center = bounds.min.add(bounds.max).scale(0.5);
    const extent = bounds.max.subtract(bounds.min);
    camera.target = center;
    camera.radius = Math.max(extent.length() * 0.8, 1);
    camera.alpha = Math.PI / 4;
    camera.beta = Math.PI / 3;
  });

  // Picking
  setupPicking();
  document.getElementById("clearSelection").addEventListener("click", clearAllSelections);

  // Mode buttons
  document.querySelectorAll("#selectMode button[data-mode]").forEach(btn => {
    btn.addEventListener("click", () => {
      pickMode = btn.dataset.mode;
      clearAllSelections();
      if (typeof clearHover === "function") clearHover();
      document.querySelectorAll("#selectMode button[data-mode]").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
    });
  });

  // Toggles
  document.getElementById("toggleFaces").addEventListener("click", (e) => {
    facesVisible = !facesVisible;
    e.target.classList.toggle("active", facesVisible);
    for (const m of currentMeshes) m.isVisible = facesVisible;
  });
  document.getElementById("toggleEdges").addEventListener("click", (e) => {
    edgesVisible = !edgesVisible;
    e.target.classList.toggle("active", edgesVisible);
    for (const l of currentEdgeLines) l.isVisible = edgesVisible;
  });
}

init();
</script>
</body>
